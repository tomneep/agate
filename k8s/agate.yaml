apiVersion: v1
kind: Namespace
metadata:
  name: agate
---
apiVersion: v1
kind: Service
metadata:
  name: django-service
  namespace: agate
spec:
  selector:
    app: django-app
  ports:
      - port: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-app
  namespace: agate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: django-app
  template:
    metadata:
      labels:
        app: django-app
    spec:
      volumes:
        - name: message-config
          secret:
            secretName: message-config-secret
        - name: message-certs
          secret:
            secretName: message-config-certs
      # By running an init container, we ensure that django doesn't
      # try to perform migrations on a non-existing database
      initContainers:
        - name: wait-for-postgres
          image: postgres:13-alpine
          command:
            [
            "sh",
            "-c",
            "echo 'Waiting for Postgres...' && \
            until pg_isready -h $POSTGRES_HOST -p $POSTGRES_PORT -U $POSTGRES_USER; do \
            echo 'Postgres unavailable - sleeping'; \
            sleep 1; \
            done"
            ]
          envFrom:
            - configMapRef:
                name: postgres-config
      containers:
        - name: web
          image: ghcr.io/climb-tre/agate:v0.0.6
          envFrom:
            - configMapRef:
                name: postgres-config
            - secretRef:
                name: postgres-secret
            - configMapRef:
                name: django-config
            - secretRef:
                name: django-secret

          volumeMounts:
            - name: message-config
              mountPath: /app/varys_config.cfg
              subPath: varys_config.cfg
              readOnly: true
            - name: message-certs
              mountPath: /app/certs/
              readOnly: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-scheduler
  namespace: agate
  labels:
    app: django-scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: django-scheduler
  template:
    metadata:
      labels:
        app: django-scheduler
    spec:
      volumes:
        - name: message-config
          secret:
            secretName: message-config-secret
        - name: message-certs
          secret:
            secretName: message-config-certs
      containers:
        - name: scheduler
          image: ghcr.io/climb-tre/agate:v0.0.6
          # This runs the scheduler, not the web server
          command: ["python", "manage.py", "runscheduler"]

          envFrom:
            - configMapRef:
                name: postgres-config
            - secretRef:
                name: postgres-secret
            - configMapRef:
                name: django-config
            - secretRef:
                name: django-secret

          volumeMounts:
            - name: message-config
              mountPath: /app/varys_config.cfg
              subPath: varys_config.cfg
              readOnly: true
            - name: message-certs
              mountPath: /app/certs/
              readOnly: true
