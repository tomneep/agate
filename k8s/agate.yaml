apiVersion: v1
kind: ConfigMap
metadata:
  name: django-config
data:
  POSTGRES_DB: "db_service_test"
  POSTGRES_USER: "postgres"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  DEBUG: "False"
  ALLOWED_HOSTS: "127.0.0.1"
  CORS_ALLOWED_ORIGINS: "http://127.0.0.1:5173/"
  CSRF_TRUSTED_ORIGINS: "http://127.0.0.1:5173/"
  ONYX_DOMAIN: ""  # Won't work
---
apiVersion: v1
kind: Service
metadata:
  name: django-service
spec:
  selector:
    app: django-app
  ports:
      - port: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: django-app
  template:
    metadata:
      labels:
        app: django-app
    spec:
      volumes:
        - name: message-config
          secret:
            secretName: message-config-secret
      containers:
        - name: web
          image: localhost/agate:latest
          imagePullPolicy: Never

          envFrom:
            - configMapRef:
                name: django-config
            - secretRef:
                name: django-secret

          volumeMounts:
            - name: message-config
              mountPath: /app/varys_config.cfg
              subPath: varys_config.cfg
              readOnly: true
