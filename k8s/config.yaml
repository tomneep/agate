apiVersion: v1
kind: ConfigMap
metadata:
  name: django-config
  namespace: agate
data:
  DEBUG: "False"
  ALLOWED_HOSTS: "127.0.0.1"
  CORS_ALLOWED_ORIGINS: "http://127.0.0.1:5173,http://localhost:5173"
